<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Creations - Employee Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;padding:20px;}
        .container{max-width:600px;margin:0 auto;}
        .header{background:linear-gradient(135deg,#0f3460 0%,#16213e 100%);color:white;padding:20px;border-radius:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
        .header h1{font-size:20px;display:flex;align-items:center;gap:10px;}
        .header h1 span{color:#e94560;}
        .header .sub{font-size:11px;opacity:0.8;}
        .logout-btn{background:#e94560;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;}
        .logout-btn:hover{background:#c73652;}
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
        .card-title{font-size:16px;font-weight:bold;color:#0f3460;margin-bottom:15px;display:flex;align-items:center;gap:10px;}
        .employee-profile{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
        .employee-profile .avatar{width:60px;height:60px;background:linear-gradient(135deg,#0f3460,#e94560);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;font-weight:bold;}
        .employee-profile .info h3{color:#0f3460;font-size:18px;}
        .employee-profile .info p{color:#6b7280;font-size:13px;}
        .gps-status{padding:12px;border-radius:10px;margin:10px 0;font-weight:bold;}
        .online{background:#dcfce7;color:#166534;}
        .offline{background:#fee2e2;color:#991b1b;}
        .coords{font-family:monospace;font-size:13px;color:#6b7280;padding:8px;background:#f1f5f9;border-radius:8px;margin-top:5px;}
        .ride{border-left:4px solid #0f3460;padding:16px;background:#f8fafc;border-radius:12px;margin-bottom:12px;}
        .ride.active{border-left-color:#10b981;background:#f0fdf4;}
        .ride.completed-ride{border-left-color:#6b7280;background:#f3f4f6;opacity:0.7;}
        .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.2s;}
        .btn-primary{background:#0f3460;color:white;}
        .btn-primary:hover{background:#16213e;}
        .btn-success{background:#10b981;color:white;}
        .btn-success:hover{background:#059669;}
        .btn-warning{background:#f59e0b;color:white;}
        .debug{background:#1f2937;color:#10b981;padding:12px;border-radius:8px;font-family:monospace;font-size:11px;max-height:150px;overflow-y:auto;}
        .company-footer{text-align:center;padding:20px;color:#6b7280;font-size:11px;}
        .no-rides{text-align:center;padding:30px 20px;color:#6b7280;}
        .no-rides .icon{font-size:48px;margin-bottom:10px;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:16px 24px;border-radius:12px;color:white;font-weight:bold;z-index:9999;display:none;animation:slideUp 0.3s;}
        .toast.success{background:#10b981;}
        .toast.error{background:#e94560;}
        @keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
        .start-ride-form{display:flex;flex-direction:column;gap:12px;}
        .start-ride-form input{padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-size:16px;}
        .start-ride-form input:focus{outline:2px solid #0f3460;}
        .completed-badge{background:#10b981;color:white;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:bold;}
    </style>
</head>
<body>
    <div class="container">
        <div id="toast" class="toast"></div>
        
        <div class="header">
            <div>
                <h1>🏢 M <span>Creations</span></h1>
                <div class="sub">Field Engineer Dashboard</div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
        </div>
        
        <div class="card" id="profileCard">
            <div class="employee-profile" id="employeeProfile"></div>
        </div>
        
        <div class="card" id="gpsCard">
            <div class="card-title">📍 GPS Status <span style="font-size:11px;color:#10b981;margin-left:auto;">⚡ Live 2s Sync</span></div>
            <div id="gpsStatus" class="gps-status offline">⏳ Waiting for GPS...</div>
            <div id="gpsCoords" class="coords">Lat: --, Lng: --</div>
            <button class="btn btn-warning" onclick="testGPS()" style="margin-top:10px;">📡 Test GPS</button>
        </div>
        
        <div class="card" id="startRideCard">
            <div class="card-title">🚗 Start New Service</div>
            <div class="start-ride-form">
                <input type="text" id="customerIdInput" placeholder="Enter Customer Unique Number">
                <button class="btn btn-primary" onclick="startRideFromCustomer()">🚀 Submit & Start Ride</button>
            </div>
        </div>
        
        <div id="ridesContainer"></div>
        
        <div class="card">
            <div class="card-title">🔍 System Log</div>
            <div id="debugLog" class="debug">[Ready] Connected to M Creations Backend...</div>
        </div>
        
        <div class="company-footer">
            <strong>🏢 M <span>Creations</span></strong> — Field Service Excellence
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
    <script>
        const currentEmployee = Storage.getLoggedInEmployee();
        if (!currentEmployee) { window.location.href = 'login.html'; }
        
        let activeRide = null;
        let watchId = null;
        let currentLat = Storage.OFFICE_LAT;
        let currentLng = Storage.OFFICE_LNG;
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }
        
        function log(msg) {
            const d = document.getElementById('debugLog');
            if (d) d.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n${d.innerHTML}`;
            console.log('[M Creations]', msg);
        }
        
        function testGPS() {
            if (!navigator.geolocation) { showToast('❌ GPS not supported', 'error'); return; }
            navigator.geolocation.getCurrentPosition(
                p => showToast(`✅ GPS Working!`, 'success'),
                e => showToast(`❌ GPS Error: ${e.message}`, 'error')
            );
        }
        
        function handleLogout() {
            if (confirm('Logout?')) {
                Storage.logoutEmployee();
                window.location.href = 'login.html';
            }
        }
        
        function loadProfile() {
            const container = document.getElementById('employeeProfile');
            const emp = currentEmployee;
            const initial = emp.name.charAt(0).toUpperCase();
            container.innerHTML = `
                <div class="avatar">${initial}</div>
                <div class="info">
                    <h3>${emp.name}</h3>
                    <p>📱 ${emp.contact || 'N/A'} · 🆔 ${emp.id}</p>
                    <p style="font-size:12px;color:#10b981;">✅ Logged in & Connected</p>
                </div>
            `;
        }
        
        function startGPS() {
            if (!navigator.geolocation) { 
                document.getElementById('gpsStatus').innerHTML = '📍 Using Office Coordinates (Default)';
                document.getElementById('gpsStatus').className = 'gps-status online';
                document.getElementById('gpsCoords').innerHTML = `Lat: ${currentLat.toFixed(6)}, Lng: ${currentLng.toFixed(6)}`;
                return; 
            }
            if (watchId) navigator.geolocation.clearWatch(watchId);
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    currentLat = pos.coords.latitude;
                    currentLng = pos.coords.longitude;
                    document.getElementById('gpsStatus').innerHTML = `✅ GPS Active (${Math.round(pos.coords.accuracy || 10)}m)`;
                    document.getElementById('gpsStatus').className = 'gps-status online';
                    document.getElementById('gpsCoords').innerHTML = `Lat: ${currentLat.toFixed(6)}, Lng: ${currentLng.toFixed(6)}`;
                    
                    if (activeRide && activeRide.status === 'in_progress') {
                        Storage.updateRideLocation(activeRide.customerId, currentLat, currentLng);
                        log(`⚡ 2s Live location synced to Admin map`);
                    }
                },
                (err) => {
                    document.getElementById('gpsStatus').innerHTML = `📍 GPS Active (Default Office)`;
                    document.getElementById('gpsStatus').className = 'gps-status online';
                    document.getElementById('gpsCoords').innerHTML = `Lat: ${currentLat.toFixed(6)}, Lng: ${currentLng.toFixed(6)}`;
                },
                { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
            );
            
            setInterval(() => {
                if (activeRide && activeRide.status === 'in_progress' && currentLat && currentLng) {
                    Storage.updateRideLocation(activeRide.customerId, currentLat, currentLng);
                }
            }, 2000);
        }
        
        async function startRideFromCustomer() {
            const customerId = document.getElementById('customerIdInput').value.trim();
            
            if (!customerId) {
                showToast('❌ Enter Customer Unique Number', 'error');
                document.getElementById('customerIdInput').focus();
                return;
            }
            
            const activeRides = Storage.getActiveRidesForEmployee(currentEmployee.id);
            if (activeRides.length > 0) {
                showToast('⚠️ Already have an active ride in progress.', 'error');
                return;
            }
            
            const ride = await Storage.startRideFromCustomerId(currentEmployee.id, customerId, currentLat, currentLng);
            activeRide = ride;
            
            document.getElementById('customerIdInput').value = '';
            loadRides();
            showToast(`✅ Service Started for: ${customerId}`, 'success');
            log(`✅ Service started for customer ${customerId}`);
        }
        
        function loadRides() {
            if (!currentEmployee) return;
            const allRides = Storage.getRidesForEmployee(currentEmployee.id);
            const assigned = allRides.filter(r => r.status !== 'completed');
            const completedRides = allRides.filter(r => r.status === 'completed');
            const container = document.getElementById('ridesContainer');
            
            const activeRideData = assigned.find(r => r.status === 'in_progress');
            if (activeRideData) { activeRide = activeRideData; }
            
            let html = '';
            
            if (assigned.length > 0) {
                html += '<div class="card"><div class="card-title">📋 Active Service</div>';
                assigned.forEach(ride => {
                    const isActive = ride.status === 'in_progress';
                    html += `
                        <div class="ride ${isActive ? 'active' : ''}">
                            <strong style="color:#0f3460;">${isActive ? '●' : '○'} Customer: ${ride.customerId || 'N/A'}</strong>
                            ${isActive ? ' <span style="color:#10b981;font-size:12px;font-weight:bold;">● LIVE (Sharing 2s GPS)</span>' : ''}
                            <div style="font-size:12px;color:#6b7280;margin-top:4px;">⏱ Started: ${new Date(ride.startTime || Date.now()).toLocaleTimeString()}</div>
                            ${isActive ? 
                                `<button class="btn btn-success" onclick="completeRide('${ride.customerId}')" style="margin-top:10px;">✅ Complete Service</button>` :
                                ''
                            }
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            if (completedRides.length > 0) {
                html += '<div class="card"><div class="card-title">✅ Completed Services</div>';
                completedRides.slice(-5).reverse().forEach(ride => {
                    html += `
                        <div class="ride completed-ride">
                            <strong style="color:#6b7280;">${ride.customerId || 'N/A'}</strong>
                            <span class="completed-badge">Done</span>
                            <div style="font-size:11px;color:#6b7280;margin-top:4px;">⏱ ${ride.duration || 0} min · 📏 ${ride.totalDistance || 0} KM</div>
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            if (assigned.length === 0 && completedRides.length === 0) {
                html = `
                    <div class="card">
                        <div class="no-rides">
                            <div class="icon">📭</div>
                            <p style="font-weight:600;color:#0f3460;">No Active Services</p>
                            <p style="font-size:13px;">Enter Customer Unique Number above to start</p>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        async function completeRide(customerId) {
            if (!confirm('✅ Complete this service?')) return;
            log(`🏁 Completing service for customer: ${customerId}`);
            
            const ride = await Storage.completeRide(customerId, currentLat, currentLng);
            
            if (ride) {
                activeRide = null;
                loadRides();
                showToast(`✅ Service Completed! ⏱ ${ride.duration || 0} min · 📏 ${ride.totalDistance || 0} KM`, 'success');
                log(`✅ Service completed for ${customerId}`);
            } else {
                showToast('❌ Failed to complete ride', 'error');
            }
        }
        
        log(`🚀 Welcome ${currentEmployee.name}!`);
        loadProfile();
        loadRides();
        startGPS();
        setInterval(() => { if (currentEmployee) loadRides(); }, 4000);
    </script>
</body>
</html>
